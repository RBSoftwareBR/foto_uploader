<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste — Upload de Foto</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: system-ui, sans-serif;
            max-width: 480px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.6rem;
        }

        button {
            padding: 0.75rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #preview {
            max-width: 100%;
            border-radius: 8px;
            display: none;
        }

        #resultado {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        #resultado.sucesso {
            background: #dcfce7;
            color: #166534;
        }

        #resultado.erro {
            background: #fee2e2;
            color: #991b1b;
        }

        .dica {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        code {
            background: #f1f5f9;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Teste de upload de foto</h1>

    <!-- Mesmo formulário de foto_form.php -->
    <form id="formulario">
        <input type="text" name="nome" placeholder="Nome">

        <input
            type="file"
            id="foto"
            name="foto"
            accept="image/*"
            capture="environment"
            required
        >

        <img id="preview" alt="Pré-visualização">

        <button type="submit" id="btnEnviar">Salvar</button>
    </form>

    <div id="resultado"></div>

    <p class="dica">
        Rode o servidor PHP na pasta do projeto:<br>
        <code>php -S localhost:8000</code><br>
        Depois abra <code>http://localhost:8000/teste.html</code>
    </p>

    <script>
    const fotoInput = document.getElementById('foto');
    const preview = document.getElementById('preview');
    const resultado = document.getElementById('resultado');
    const btnEnviar = document.getElementById('btnEnviar');

    fotoInput.addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    });

    document.getElementById('formulario').addEventListener('submit', async function (e) {
        e.preventDefault();

        btnEnviar.disabled = true;
        btnEnviar.textContent = 'Enviando...';
        resultado.style.display = 'none';

        const formData = new FormData(this);

        try {
            const response = await fetch('upload_foto.php', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                console.log('URL da foto:', result.url);

                resultado.className = 'sucesso';
                resultado.innerHTML = 'Foto enviada!<br><a href="' + result.url + '" target="_blank">' + result.url + '</a>';
            } else {
                resultado.className = 'erro';
                resultado.textContent = result.error;
            }
        } catch (err) {
            resultado.className = 'erro';
            resultado.textContent = 'Erro na requisição. O servidor PHP está rodando?';
        }

        resultado.style.display = 'block';
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Salvar';
    });
    </script>
</body>
</html>
